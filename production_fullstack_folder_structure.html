function badge(b){return b?`<span class="badge ${b}">${b}</span>`:'';}

function icon(type,isDir){
  if(isDir)return'📁';
  if(type==='config')return'⚙';
  if(type==='env')return'🔐';
  if(type==='entry')return'▶';
  return'·';
}

let eid=0;
function render(node,depth){
  const id='n'+(eid++);
  const isDir=node.type==='dir'||node.children;
  const hasChildren=node.children&&node.children.length;
  const open=node.open!==false;
  const typeClass=node.type==='config'?'config':node.type==='env'?'env':node.type==='entry'?'entry':isDir?'dir':'file';

  let inner=`<div class="entry" onclick="${hasChildren?`toggleNode('${id}')`:''}" style="cursor:${hasChildren?'pointer':'default'}">`;
  for(let i=0;i<depth;i++)inner+=`<span class="indent">│</span>`;
  inner+=`<span class="toggle">${hasChildren?(open?'▾':'▸'):' '}</span>`;
  inner+=`<span class="icon">${icon(node.type,isDir)}</span>`;
  inner+=`<span class="label"><span class="name ${typeClass}">${node.name}</span>`;
  if(node.desc)inner+=`<span class="desc">${node.desc}</span>`;
  inner+=`</span>`;
  if(node.badge)inner+=badge(node.badge);
  inner+=`</div>`;

  if(hasChildren){
    const ch=node.children.map(c=>render(c,depth+1)).join('');
    const mh=open?'9999px':'0';
    return`<div id="${id}" class="${open?'':'collapsed'}" data-open="${open}">${inner}<div class="children" style="max-height:${mh}">${ch}</div></div>`;
  }
  return inner;
}

function toggleNode(id){
  const el=document.getElementById(id);
  const open=el.dataset.open==='true';
  el.dataset.open=String(!open);
  const ch=el.querySelector('.children');
  if(open){el.classList.add('collapsed');ch.style.maxHeight='0';}
  else{el.classList.remove('collapsed');ch.style.maxHeight='9999px';}
}

let allOpen=false;
function toggleAll(){
  allOpen=!allOpen;
  document.querySelectorAll('[data-open]').forEach(el=>{
    const ch=el.querySelector('.children');
    if(allOpen){el.dataset.open='true';el.classList.remove('collapsed');ch.style.maxHeight='9999px';}
    else{el.dataset.open='false';el.classList.add('collapsed');ch.style.maxHeight='0';}
  });
  document.querySelector('.expand-all').textContent=allOpen?'collapse all':'expand all';
}

document.getElementById('tree').innerHTML=render(T,0);
